<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>He thong diem danh khuon mat</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      padding: 16px;
    }

    .camera-wrap {
      position: relative;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      overflow: hidden;
      background: #111827;
      aspect-ratio: 16 / 9;
    }

    #camera {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    #overlay {
      position: absolute;
      top: 10px;
      left: 12px;
      color: #22c55e;
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .status-box {
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
    }

    .status-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .status-value {
      font-size: 18px;
      font-weight: 700;
    }

    .db-warning {
      margin-top: 10px;
      color: #b91c1c;
      font-size: 14px;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>He thong diem danh khuon mat</h1>
      <a href="/admin">Xem lich su diem danh</a>
    </div>

    <div class="grid">
      <section class="card">
        <div class="camera-wrap">
          <video id="camera" autoplay playsinline muted></video>
          <div id="overlay">Trang thai cho</div>
        </div>
        <canvas id="snapshot" style="display:none"></canvas>

        <div class="actions">
          <button id="startBtn" type="button">Bat dau diem danh</button>
          <span id="countdownText">San sang.</span>
        </div>
      </section>

      <aside class="card">
        <div class="status-box">
          <div class="status-label">Trang thai</div>
          <div id="statusText" class="status-value">Trang thai cho</div>
        </div>

        <div class="status-box">
          <div class="status-label">Ket qua gan nhat</div>
          <div id="resultText" class="status-value">Chua co ket qua</div>
        </div>

        {% if db_error %}
        <div class="db-warning">{{ db_error }}</div>
        {% endif %}

        {% if not face_runtime_available %}
        <div class="db-warning">Face runtime unavailable: {{ face_runtime_reason }}</div>
        {% endif %}
      </aside>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const countdownText = document.getElementById("countdownText");
    const statusText = document.getElementById("statusText");
    const resultText = document.getElementById("resultText");
    const overlay = document.getElementById("overlay");
    const video = document.getElementById("camera");
    const canvas = document.getElementById("snapshot");

    let stream = null;
    let frameTimer = null;

    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false,
        });
        video.srcObject = stream;
      } catch (error) {
        statusText.textContent = "Khong mo duoc camera trinh duyet";
        resultText.textContent = "Hay cap quyen camera va tai lai trang";
      }
    }

    async function startScan() {
      startBtn.disabled = true;
      try {
        const response = await fetch("/start_scan", { method: "POST" });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Khong the bat dau quet");
        }

        if (data.status === "busy") {
          countdownText.textContent = `Dang quet: ${data.remaining_seconds}s`;
        } else {
          countdownText.textContent = "Da bat dau phien quet 6 giay";
        }

        startFrameLoop();
      } catch (error) {
        countdownText.textContent = error.message || "Khong the bat dau quet";
      } finally {
        startBtn.disabled = false;
      }
    }

    function startFrameLoop() {
      if (frameTimer) {
        return;
      }

      frameTimer = setInterval(sendFrame, 250);
    }

    function stopFrameLoop() {
      if (frameTimer) {
        clearInterval(frameTimer);
      }
      frameTimer = null;
    }

    async function sendFrame() {
      if (!video.videoWidth || !video.videoHeight) {
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      const imageBase64 = canvas.toDataURL("image/jpeg", 0.82);

      try {
        const response = await fetch("/process_frame", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image_base64: imageBase64 }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Xu ly khung hinh that bai");
        }

        renderState(data);
      } catch (error) {
        resultText.textContent = error.message || "Loi gui frame";
      }
    }

    function renderState(data) {
      if (data.is_scanning) {
        statusText.textContent = "Dang quet";
        countdownText.textContent = `Con ${data.remaining_seconds}s`;
        overlay.textContent = `${data.remaining_seconds}s`;
      } else {
        statusText.textContent = data.status_text || "Trang thai cho";
        countdownText.textContent = "San sang.";
        overlay.textContent = "Trang thai cho";
        stopFrameLoop();
      }

      if (data.preview && data.preview.name) {
        resultText.textContent = `Dang theo doi: ${data.preview.name}`;
      }

      if (data.last_result && data.last_result.matched) {
        resultText.textContent = `Da nhan dien: ${data.last_result.name}`;
      } else if (data.last_result && data.last_result.message) {
        resultText.textContent = data.last_result.message;
      }

      if (data.last_error) {
        resultText.textContent = `Loi AI: ${data.last_error}`;
      }
    }

    async function refreshStatus() {
      try {
        const response = await fetch("/scan_status", { cache: "no-store" });
        const data = await response.json();
        renderState(data);
      } catch (error) {
        statusText.textContent = "Mat ket noi backend";
      }
    }

    startBtn.addEventListener("click", startScan);
    setInterval(refreshStatus, 700);
    initCamera();
    refreshStatus();
  </script>
</body>
</html>
