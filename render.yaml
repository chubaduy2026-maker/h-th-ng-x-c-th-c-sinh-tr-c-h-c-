services:
  - type: web
    name: tvu-face-attendance
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements-render.txt
    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: AUTO_INSTALL_FACE_RUNTIME
        value: "1"
      - key: FACE_RUNTIME_PIP_PACKAGES
        value: insightface onnxruntime
      - key: RELEASE
        value: 2026-04-03-render-headless-python
